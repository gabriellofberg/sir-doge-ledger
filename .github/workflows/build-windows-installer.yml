name: build-windows-installer

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          $rollupVersionScript = @'
          let lock;
          try {
            lock = require('./package-lock.json');
          } catch (error) {
            const details = error?.stack ?? error?.message ?? String(error);
            console.error(`Failed to load package-lock.json from the frontend directory: ${details}`);
            process.exit(1);
          }
          if (!lock.packages) {
            console.error('package-lock.json is missing the top-level packages map');
            process.exit(1);
          }
          const rollupPackage = lock.packages['node_modules/rollup'];
          if (!rollupPackage) {
            console.error('package-lock.json is missing the node_modules/rollup package entry');
            process.exit(1);
          }
          if (!rollupPackage.optionalDependencies) {
            console.error('package-lock.json is missing optionalDependencies for node_modules/rollup');
            process.exit(1);
          }
          const version = rollupPackage.optionalDependencies['@rollup/rollup-win32-x64-msvc'];
          if (!version) {
            console.error('package-lock.json is missing @rollup/rollup-win32-x64-msvc in node_modules/rollup optionalDependencies');
            process.exit(1);
          }
          process.stdout.write(version);
          '@
          $rollupVersion = node -e $rollupVersionScript
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to resolve the lockfile-pinned version for @rollup/rollup-win32-x64-msvc"
          }
          if ([string]::IsNullOrWhiteSpace($rollupVersion)) {
            throw "Resolved an empty lockfile-pinned version for @rollup/rollup-win32-x64-msvc"
          }
          npm install --no-save "@rollup/rollup-win32-x64-msvc@$rollupVersion"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install @rollup/rollup-win32-x64-msvc@$rollupVersion"
          }
          npm run build

      - name: Install Python deps and run tests
        run: |
          pip install -r backend/requirements-dev.txt pyinstaller
          pytest backend/tests -q
        env:
          SIR_DOGE_DATA_DIR: ${{ runner.temp }}/sir-doge-test

      - name: PyInstaller bundle
        run: pyinstaller --noconfirm sir-doge.spec

      - name: Inno Setup installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\windows\setup.iss"

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: SirDogeLedger-Windows-Setup
          path: |
            dist/installer/SirDogeLedger-Setup.exe
            dist/SirDogeLedger/

      - name: Summary
        run: |
          echo "Installer ready: dist/installer/SirDogeLedger-Setup.exe"
          Get-Item dist/installer/SirDogeLedger-Setup.exe | Format-List Name, Length, LastWriteTime
