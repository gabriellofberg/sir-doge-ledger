name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r backend/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check backend launcher.py
      - name: Tests (pytest)
        run: pytest backend/tests -q
        env:
          SIR_DOGE_DATA_DIR: /tmp/sir-doge-test
          SIR_DOGE_TOKEN: ci-test-token
      - name: Vulnerability scan (pip-audit)
        run: |
          pip-audit -r backend/requirements.txt
          pip-audit -r backend/requirements-dev.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Vulnerability scan (npm audit)
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
